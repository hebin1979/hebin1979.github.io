<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=2.0,user-scalable=yes">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>腾讯交易助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;color:#1a1a2e;line-height:1.5;-webkit-text-size-adjust:100%}
:root{--r:#e74c3c;--g:#27ae60;--o:#f39c12;--b:#3498db;--p:#8e44ad;--t:#1a1a2e;--s:#666;--border:#e0e3e8}
button{font-family:inherit;cursor:pointer}

.header{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);color:#fff;padding:10px 14px;display:flex;flex-direction:column;gap:8px}
.header h1{font-size:1.05em;font-weight:700;width:100%}
.datastamp{font-size:.72em;color:rgba(255,255,255,.75);font-weight:400}
.datastamp.warn{color:#ffd479;font-weight:600}
.stock-input-group{display:flex;gap:6px;align-items:center;width:100%}
.stock-input-group input{padding:9px 12px;border:2px solid rgba(255,255,255,.2);border-radius:7px;background:rgba(255,255,255,.1);color:#fff;font-size:14px;flex:1;min-width:0;outline:none}
.stock-input-group input:focus{border-color:var(--b)}
.stock-input-group input::placeholder{color:rgba(255,255,255,.4)}
.stock-input-group button{padding:9px 14px;background:var(--b);color:#fff;border:none;border-radius:7px;font-size:14px;font-weight:600;white-space:nowrap;min-height:40px}
.stock-input-group button:active{background:#2980b9}
.stock-input-group .examples{font-size:.7em;color:rgba(255,255,255,.5);width:100%;line-height:1.6}
.stock-input-group .examples b{color:rgba(255,255,255,.75);cursor:pointer;margin-right:8px;display:inline-block}
.stock-input-group .examples b{color:rgba(255,255,255,.7);cursor:pointer;margin-right:6px}

.main{display:flex;flex-direction:column;gap:10px;padding:10px 12px 30px}
.card{background:#fff;border-radius:10px;padding:12px 14px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.card h3{font-size:.82em;font-weight:700;color:var(--t);margin-bottom:8px;padding-bottom:5px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:4px}
.card h3 .sub{font-size:.8em;font-weight:400;color:var(--s);margin-left:auto}
.metric-row{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.metric-box{background:#f8f9fb;border-radius:6px;padding:7px 6px;text-align:center;border:1px solid var(--border)}
.metric-box .lbl{font-size:.62em;color:var(--s);margin-bottom:1px}
.metric-box .val{font-size:.85em;font-weight:700;line-height:1.2}
.metric-box .sub{font-size:.6em;color:var(--s);margin-top:1px}

/* Section: Buy/Sell */
.reco-box{border:2px solid var(--r);background:linear-gradient(135deg,#fff5f5,#fff);padding:14px}
.reco-box h3{border-bottom-color:var(--r);font-size:.95em}
.price-block{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.price-block .pm{font-size:1.8em;font-weight:800}
.price-block .pc{font-size:.85em;font-weight:700}
.tag{padding:2px 6px;border-radius:3px;font-size:.65em;font-weight:600}
.tag-up{background:#fde8e8;color:var(--r)}
.tag-down{background:#e8f8f0;color:var(--g)}
.tag-info{background:#e8f0fe;color:var(--b)}
.price-meta{display:flex;gap:6px 12px;flex-wrap:wrap;color:var(--s);font-size:.76em;margin-bottom:10px}
.price-meta b{color:var(--t)}
.assess-grid{display:grid;grid-template-columns:1fr;gap:6px;margin-bottom:10px}
.assess-item{background:#fff;border-radius:6px;padding:8px 10px;border:1px solid var(--border)}
.assess-item .at{font-size:.68em;color:var(--s);margin-bottom:1px}
.assess-item .av{font-size:.88em;font-weight:700;line-height:1.3}
.assess-item .ad{font-size:.62em;color:var(--s);margin-top:1px;line-height:1.3}
.reco-prices{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px}
.reco-price{padding:8px 6px;background:#fff;border-radius:6px;text-align:center;border:1px solid var(--border)}
.reco-price.sp{border-color:var(--g)}
.reco-price .rl{font-size:.62em;color:var(--s)}
.reco-price .rv{font-size:1em;font-weight:800;color:var(--r);line-height:1.2}
.reco-price.sp .rv{color:var(--g)}
.reco-price .rp{font-size:.6em;color:var(--s);margin-top:1px}
.reco-price .rd{font-size:.58em;color:#999;margin-top:1px;line-height:1.2}
.ops-box{padding:8px 10px;font-size:.7em;line-height:1.7;border-radius:6px;border:1px solid var(--border);background:#fff;margin-top:8px}

/* Section: Score */
.score-card{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:14px}
.score-card h3{color:#fff;border-bottom-color:rgba(255,255,255,.2);font-size:.95em}
.score-card .sl{color:rgba(255,255,255,.7);font-size:.7em}
.score-main{display:flex;align-items:center;gap:14px;margin:6px 0 8px}
.score-num{font-size:3em;font-weight:800;line-height:1}
.score-text{flex:1}
.score-text .st{font-size:1.1em;font-weight:700;margin-bottom:3px}
.score-text .sd{font-size:.7em;opacity:.85;line-height:1.4}
.score-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
.score-item{background:rgba(255,255,255,.08);border-radius:6px;padding:6px 4px;text-align:center}
.score-item .sv{font-size:1.1em;font-weight:800}
.score-item .slbl{font-size:.58em;opacity:.75;line-height:1.2}
.score-item.s-high{background:rgba(231,76,60,.2);color:#ffaaa3}
.score-item.s-medium{background:rgba(243,156,18,.2);color:#ffd47a}
.score-item.s-low{background:rgba(39,174,96,.2);color:#a8e6c0}

/* MA card layout (no scroll) */
.ma-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:8px}
.ma-card{background:#f8f9fb;border-radius:6px;padding:6px 8px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--border);font-size:.78em}
.ma-card .ml{font-weight:600;color:var(--t)}
.ma-card .mv{font-weight:700;font-size:1.1em}
.ma-card .md{font-size:.7em;font-weight:600}
.ma-summary{padding:8px 10px;background:#f0f4ff;border-radius:6px;font-size:.78em;line-height:1.5;border:1px solid #d6e0ff}
.ma-summary .num-r{color:var(--r);font-weight:700;font-size:1.05em}
.ma-summary .num-g{color:var(--g);font-weight:700;font-size:1.05em}

/* K-line */
.chart-wrap{position:relative;width:100%;height:220px}
.chart-wrap canvas{display:block;width:100%;height:100%}
.chart-legend{display:flex;gap:6px;font-size:.62em;margin-top:4px;flex-wrap:wrap}
.chart-legend span{display:flex;align-items:center;gap:2px;color:var(--s)}
.chart-legend .dot{width:10px;height:3px;display:inline-block;border-radius:2px}

/* Tech indicators combined */
.ind-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ind-card{background:#f8f9fb;border-radius:6px;padding:8px;text-align:center;border:1px solid var(--border)}
.ind-card .it{font-size:.7em;color:var(--s);font-weight:600}
.ind-card .iv{font-size:1.05em;font-weight:800;margin:2px 0}
.ind-card .id{font-size:.6em;color:var(--s)}
.ind-card .is{font-size:.65em;font-weight:700;margin-top:2px}

/* MACD & RSI + KDJ + Boll in side cards */
.gauge-container{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.gauge{position:relative;width:80px;height:80px;flex-shrink:0}
.gauge svg{transform:rotate(-90deg)}
.gauge .ct{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.gauge .ct .gv{font-size:1em;font-weight:800;line-height:1}
.gauge .ct .gl{font-size:.55em;color:var(--s)}
.gauge-info{font-size:.7em;color:var(--s);line-height:1.7;flex:1;min-width:0}
.gauge-info b{color:var(--t)}

/* Sentiment */
.sentiment-bar{display:flex;height:18px;border-radius:9px;overflow:hidden;margin:4px 0}
.sentiment-bar .seg{display:flex;align-items:center;justify-content:center;font-size:.6em;font-weight:700;color:#fff}
.news-list{font-size:.72em;margin-top:6px}
.news-item{padding:5px 0;border-bottom:1px solid #f0f0f0;display:flex;align-items:flex-start;gap:6px}
.news-item:last-child{border-bottom:none}
.news-item .ndt{flex-shrink:0;color:#999;font-size:.82em;width:50px;white-space:nowrap;text-align:right}
.news-item .ntxt{line-height:1.4}

/* Analyst - list of major firms */
.anly-list{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.anly-item{background:#f8f9fb;border-radius:6px;padding:7px 8px;border:1px solid var(--border);font-size:.72em}
.anly-item .an-firm{font-weight:700;color:var(--t);margin-bottom:1px}
.anly-item .an-rating{color:var(--r);font-weight:700;margin-bottom:1px}
.anly-item .an-target{color:var(--s);font-size:.95em}
.anly-item .an-note{font-size:.85em;color:#999;margin-top:2px;line-height:1.3}
.anly-summary{padding:6px 8px;background:linear-gradient(90deg,#fde8e8,#fff5f5);border-radius:6px;font-size:.74em;margin-bottom:6px;border:1px solid #fcd7d2}
.anly-summary b{color:var(--r);font-size:1.15em}

/* Status messages */
.status-msg{padding:20px;text-align:center;color:var(--s);font-size:.9em}
.status-error{padding:14px;background:#fde8e8;color:#c0392b;border-radius:8px;font-size:.78em;border:1px solid #f5b7b1}

.footer{text-align:center;padding:14px;color:#999;font-size:.62em}
.footer b{color:var(--r)}

/* Tablet */
@media(min-width:768px){
  .main{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px 20px}
  .full{grid-column:1/-1}
  .metric-row{grid-template-columns:repeat(4,1fr)}
  .ma-grid{grid-template-columns:repeat(4,1fr)}
  .reco-prices{grid-template-columns:repeat(4,1fr)}
  .anly-list{grid-template-columns:repeat(3,1fr)}
  .assess-grid{grid-template-columns:1fr 1fr}
  .chart-wrap{height:280px}
  .header{padding:12px 20px}
  .header h1{font-size:1.2em}
  .stock-input-group{width:100%}
  .stock-input-group input{width:220px;flex:none}
  .stock-input-group .examples{width:100%}
}

/* Desktop */
@media(min-width:1024px){
  .main{padding:14px 28px;gap:14px}
  .metric-row{grid-template-columns:repeat(auto-fit,minmax(100px,1fr))}
  .reco-prices{display:flex;gap:10px}
  .reco-price{flex:1}
  .score-grid{grid-template-columns:repeat(4,1fr)}
  .anly-list{grid-template-columns:repeat(5,1fr)}
  .chart-wrap{height:320px}
  .assess-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div class="header">
  <h1>📊 腾讯交易助手</h1>
  <div id="dataStamp" class="datastamp"></div>
  <div class="stock-input-group" style="width:100%">
    <span class="examples">标的：<b style="color:rgba(255,255,255,.85)">00700 腾讯控股（港股）</b> · 实时技术分析 + 多维度 AI 评分，自动判断买入/卖出/持有</span>
  </div>
</div>

<div class="main" id="main">
  <div class="status-msg">加载中...</div>
</div>

<div class="footer">
  ⚠️ 仅供学习参考，不构成投资建议。<br>
  数据：东方财富、Yahoo Finance、公开研报 | 实时 <span id="updateTime">--</span>
</div>

<script>
// =============================================================
//  SECTION 1: UTILITIES
// =============================================================
var R='#e74c3c',G='#27ae60',O='#f39c12',B='#3498db',P='#8e44ad',T='#1a1a2e',S='#666';

function parseStockCode(input){
  input=(input||'').trim().toUpperCase();
  if(!input) return null;
  var low=input.toLowerCase();
  // Already has prefix
  if(/^(HK|SH|SZ|US)\d+/.test(low)) return {secid: low, raw: input, market: low.startsWith('hk')?'港股':low.startsWith('sh')?'沪A':low.startsWith('sz')?'深A':'美股'};
  if(/^[A-Z]+$/.test(input)) return {secid:'105.'+input, raw:input, market:'美股'};
  if(/^\d{5}$/.test(input) && input.startsWith('0')) return {secid:'116.'+input, raw:input, market:'港股'};
  if(/^\d{6}$/.test(input)){
    if(input.startsWith('6')) return {secid:'1.'+input, raw:input, market:'沪A'};
    if(input.startsWith('0')||input.startsWith('3')) return {secid:'0.'+input, raw:input, market:'深A'};
  }
  return {secid:'116.'+input, raw:input, market:'其他'};
}

function fmtNum(n,d){if(n==null||isNaN(n))return'--';d=d||2;return Number(n).toFixed(d);}
function fmtBn(n){if(n==null)return'--';if(n>=1e12)return(n/1e12).toFixed(1)+'万亿';if(n>=1e8)return(n/1e8).toFixed(0)+'亿';if(n>=1e4)return(n/1e4).toFixed(0)+'万';return n.toFixed(0);}

// =============================================================
//  SECTION 2: API FETCH (Eastmoney public via JSONP, no proxy needed)
// =============================================================
var API_BASE='https://push2.eastmoney.com/api/qt/stock/get';
var KL_BASE='https://push2his.eastmoney.com/api/qt/stock/kline/get';

// JSONP：东方财富 push2 接口原生支持 cb= 回调，可绕过 CORS，大陆浏览器直连稳定
function jsonp(url,timeout){
  return new Promise(function(resolve,reject){
    var cb='jp_'+Date.now()+'_'+Math.floor(Math.random()*1e6);
    var s=document.createElement('script');
    var t=setTimeout(function(){cleanup();reject(new Error('请求超时'));},timeout||10000);
    function cleanup(){clearTimeout(t);try{delete window[cb];}catch(e){window[cb]=undefined;}if(s.parentNode)s.parentNode.removeChild(s);}
    window[cb]=function(data){cleanup();resolve(data);};
    s.onerror=function(){cleanup();reject(new Error('网络请求失败'));};
    s.src=url+(url.indexOf('?')>=0?'&':'?')+'cb='+cb;
    document.head.appendChild(s);
  });
}

// 原生 JS 文本接口加载（gtimg 报价用，返回 v_xxx="..." 赋值语句）
function loadScriptRaw(url,timeout){
  return new Promise(function(res,rej){
    var s=document.createElement('script');
    var t=setTimeout(function(){cleanup();rej(new Error('请求超时'));},timeout||10000);
    function cleanup(){clearTimeout(t);if(s.parentNode)s.parentNode.removeChild(s);}
    s.onerror=function(){cleanup();rej(new Error('网络请求失败'));};
    s.onload=function(){cleanup();res(true);};
    s.src=url;document.head.appendChild(s);
  });
}
// 东财实时报价（带重试）
async function fetchEastmoneyQuote(secid,retries){
  var fields='f43,f44,f45,f46,f48,f57,f58,f60,f116,f117,f162,f167,f168,f169,f170';
  var lastErr;
  for(var i=0;i<(retries||1);i++){
    try{
      var j=await jsonp(API_BASE+'?secid='+secid+'&fields='+fields+'&invt=2');
      if(j&&j.data) return j.data;
      lastErr=new Error('未获取到行情数据');
    }catch(e){ lastErr=e; }
  }
  throw lastErr||new Error('东财行情失败');
}
// 腾讯 gtimg 实时报价兜底（同厂商域名，大陆访问极稳）
async function fetchGtimgQuote(secid){
  var code=secid.split('.')[1];
  var varName='v_hk'+code;
  await loadScriptRaw('https://qt.gtimg.cn/q=hk'+code);
  var raw=window[varName];
  if(!raw) throw new Error('gtimg 无数据');
  var p=raw.split('~');
  function numOr(v){var n=parseFloat(v);return isNaN(n)?null:n;}
  function rng(v,lo,hi){return (v!=null&&v>=lo&&v<=hi)?v:null;}
  return {
    f43:numOr(p[3]), f60:numOr(p[4]), f46:numOr(p[5]),
    f44:numOr(p[34]), f45:numOr(p[35]),
    f169:numOr(p[32]), f170:numOr(p[33]),
    f48:numOr(p[38]), f57:code, f58:p[1]||'腾讯控股',
    f116:(numOr(p[46])!=null)?numOr(p[46])*10000:null,
    f162:rng(numOr(p[43]),0,200)||rng(numOr(p[44]),0,200),
    f167:rng(numOr(p[45]),0,50),
    f168:numOr(p[39])
  };
  window.__gtimgDt=p[30]||'';
}
// 东财 K线（带重试）
async function fetchEastmoneyKline(secid,limit,retries){
  var lastErr;
  for(var i=0;i<(retries||1);i++){
    try{
      var j=await jsonp(KL_BASE+'?secid='+secid+'&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61&klt=101&fqt=0&beg=0&end=20500101&lmt='+(limit||120));
      if(j&&j.data&&j.data.klines) return j.data.klines.map(function(s){var x=s.split(',');return {date:x[0],open:+x[1],close:+x[2],high:+x[3],low:+x[4],volume:+(x[5]||0),amount:+(x[6]||0)};});
      lastErr=new Error('未获取到K线数据');
    }catch(e){ lastErr=e; }
  }
  throw lastErr||new Error('东财K线失败');
}
// 腾讯 gtimg K线兜底
async function fetchGtimgKline(secid,limit){
  var code=secid.split('.')[1];
  var url='https://web.ifzq.gtimg.cn/appstock/app/fqkline/get?param=hk'+code+',day,,,'+(limit||120)+',qfq';
  var j=await jsonp(url);
  var node=j&&j.data&&j.data['hk'+code];
  var arr=(node&&(node.qfqday||node.day))||[];
  if(!arr.length) throw new Error('gtimg K线为空');
  return arr.map(function(x){return {date:x[0],open:+x[1],close:+x[2],high:+x[3],low:+x[4],volume:+(x[5]||0),amount:+(x[6]||0)};});
}
// 统一入口：东财(重试) → 腾讯 gtimg 兜底
async function fetchQuote(secid){
  try{ return await fetchEastmoneyQuote(secid,2); }
  catch(e){ console.warn('东财行情失败, 转 gtimg:',e); }
  return await fetchGtimgQuote(secid);
}
async function fetchKline(secid,limit){
  try{ return await fetchEastmoneyKline(secid,limit,2); }
  catch(e){ console.warn('东财K线失败, 转 gtimg:',e); }
  return await fetchGtimgKline(secid,limit);
}

// =============================================================
//  SECTION 3: INDICATOR CALCULATIONS
// =============================================================
function MA(data,n){
  if(data.length<n) return [];
  var res=[],sum=0;
  for(var i=0;i<data.length;i++){
    sum+=data[i].close;
    if(i>=n) sum-=data[i-n].close;
    res.push(i>=n-1?sum/n:null);
  }
  return res;
}
function EMA(data,n){
  var k=2/(n+1),res=[],prev=null;
  for(var i=0;i<data.length;i++){
    if(i===0) prev=data[i].close;
    else prev=data[i].close*k+prev*(1-k);
    res.push(prev);
  }
  return res;
}
function MACD(data){
  var e12=EMA(data,12),e26=EMA(data,26);
  var dif=[],dea=[],hist=[];
  for(var i=0;i<data.length;i++){
    dif.push(e12[i]-e26[i]);
    dea.push(EMA(dif.map(function(_,j){return j<=i?dif[j]:null}),9)[i]||0);
    hist.push((dif[i]-dea[i])*2);
  }
  return {dif:dif,dea:dea,macd:hist};
}
function RSI(data,n){
  n=n||14; var res=[],gain=0,loss=0;
  for(var i=1;i<data.length;i++){
    var ch=data[i].close-data[i-1].close;
    if(i<=n){gain+=Math.max(0,ch);loss+=Math.max(0,-ch);if(i===n){var ag=gain/n,al=loss/n;res[i-1]=100-100/(1+ag/(al||1e-9));}}
    else{
      gain=(gain*(n-1)+Math.max(0,ch))/n;
      loss=(loss*(n-1)+Math.max(0,-ch))/n;
      res[i-1]=100-100/(1+gain/(loss||1e-9));
    }
  }
  return res;
}
function KDJ(data){
  var k=50,d=50,j=50,res=[];
  var low9=0,high9=0;
  for(var i=0;i<data.length;i++){
    if(i<9){low9=Math.min.apply(null,data.slice(0,i+1).map(function(x){return x.low;}));high9=Math.max.apply(null,data.slice(0,i+1).map(function(x){return x.high;}));}
    else{low9=Math.min.apply(null,data.slice(i-8,i+1).map(function(x){return x.low;}));high9=Math.max.apply(null,data.slice(i-8,i+1).map(function(x){return x.high;}));}
    var rsv=high9===low9?50:(data[i].close-low9)/(high9-low9)*100;
    k=k*2/3+rsv/3;d=d*2/3+k/3;j=3*k-2*d;
    res.push({k:k,d:d,j:j});
  }
  return res;
}
function Boll(data){
  var n=20,res=[];
  for(var i=0;i<data.length;i++){
    if(i<n-1){res.push({upper:null,middle:null,lower:null});continue;}
    var slice=data.slice(i-n+1,i+1);
    var m=slice.reduce(function(s,x){return s+x.close;},0)/n;
    var v=slice.reduce(function(s,x){return s+(x.close-m)*(x.close-m);},0)/n;
    var sd=Math.sqrt(v);
    res.push({upper:m+2*sd,middle:m,lower:m-2*sd});
  }
  return res;
}

// 5. 技术指标综合

  var h='<div class="card"><h3>🎯 技术指标综合</h3><div class="ind-grid">';
  var macdC=d.macd.mval>0?R:G,macdS=d.macd.mval>0?'金叉看涨':'死叉看跌';
  h+='<div class="ind-card"><div class="it">MACD(12,26,9)</div><div class="iv" style="color:'+macdC+'">'+fmtNum(d.macd.mval,2)+'</div><div class="id">DIF '+fmtNum(d.macd.dif,2)+' / DEA '+fmtNum(d.macd.dea,2)+'</div><div class="is" style="color:'+macdC+'">'+macdS+'</div></div>';
  h+='<div class="ind-card"><div class="it">RSI(14)</div><div class="iv" style="color:'+rsiC(d.rsi.rsi14)+'">'+fmtNum(d.rsi.rsi14,1)+'</div><div class="id">6日 '+fmtNum(d.rsi.rsi6,1)+' / 24日 '+fmtNum(d.rsi.rsi24,1)+'</div><div class="is" style="color:'+rsiC(d.rsi.rsi14)+'">'+rsiL(d.rsi.rsi14)+'</div></div>';
  h+='<div class="ind-card"><div class="it">KDJ</div><div class="iv" style="color:'+kdjC(d.kdj.j)+'">K '+fmtNum(d.kdj.k,1)+'</div><div class="id">D '+fmtNum(d.kdj.d,1)+' / J '+fmtNum(d.kdj.j,1)+'</div><div class="is" style="color:'+kdjC(d.kdj.j)+'">'+kdjL(d.kdj.j)+'</div></div>';
  var bp=d.price>d.boll.middle?'中轨上(偏强)':'中轨下(偏弱)';
  h+='<div class="ind-card"><div class="it">布林带(20,2)</div><div class="iv" style="font-size:.78em">上 '+fmtNum(d.boll.upper,0)+' / 下 '+fmtNum(d.boll.lower,0)+'</div><div class="id">中轨 '+fmtNum(d.boll.middle,0)+'</div><div class="is" style="color:'+(d.price>d.boll.middle?R:G)+'">'+bp+'</div></div>';
  var vs=d.volume>d.volMA?'放量':'缩量';
  var vc=d.volume>d.volMA?R:G;
  h+='<div class="ind-card"><div class="it">成交量</div><div class="iv">'+fmtBn(d.volume)+'</div><div class="id">20日均 '+fmtBn(d.volMA)+'</div><div class="is" style="color:'+vc+'">'+vs+'</div></div>';
  var trLabel=d.turnoverRate<1?'低活跃':d.turnoverRate<3?'正常':d.turnoverRate<5?'活跃':'极高';
  h+='<div class="ind-card"><div class="it">换手率</div><div class="iv">'+fmtNum(d.turnoverRate,2)+'%</div><div class="id">市场关注度</div><div class="is">'+trLabel+'</div></div>';
  h+='</div></div>';
  // Fix template literal issue
  return h;
}

// 6. 均线 (cards not table)
function panelMA(d){
  var h='<div class="card"><h3>📈 均线系统</h3><div class="ma-grid">';
  var mas=[{k:'ma5',l:'MA5',c:R},{k:'ma10',l:'MA10',c:'#e67e22'},{k:'ma20',l:'MA20',c:O},{k:'ma30',l:'MA30',c:'#2ecc71'},{k:'ma60',l:'MA60',c:B},{k:'ma120',l:'MA120',c:P},{k:'ma250',l:'MA250',c:'#1abc9c'}];
  var bc=0,sc=0;
  for(var i=0;i<mas.length;i++){
    var m=mas[i],mv=d.ma[m.k];
    if(!mv){continue;}
    var df=d.price-mv,dp=((df/mv)*100).toFixed(2);
    var isUp=df>0;
    if(isUp)bc++;else sc++;
    h+='<div class="ma-card"><div class="ml" style="color:'+m.c+'">'+m.l+'</div><div style="text-align:right"><div class="mv">'+fmtNum(mv,1)+'</div><div class="md" style="color:'+(isUp?R:G)+'">'+(isUp?'↑ +':'↓ ')+dp+'%</div></div></div>';
  }
  h+='</div>';
  h+='<div class="ma-summary">综合: <span class="num-r">'+bc+'</span>买 / <span class="num-g">'+sc+'</span>卖 | 短期均线'+(d.price>d.ma.ma20?'多头':'空头')+', 中长期均线'+(d.price>d.ma.ma60?'多头':'空头, 压制较强')+'</div>';
  h+='</div>';
  return h;
}

// 7. MACD & RSI gauge
function panelMACDRSI(d){
  var r=d.rsi.rsi14,pct=Math.min(100,Math.max(0,r)),circ=2*Math.PI*35,gc=rsiC(r);
  var h='<div class="card"><h3>📊 MACD & RSI 深度</h3><div class="gauge-container">';
  h+='<div class="gauge"><svg width="80" height="80" viewBox="0 0 80 80"><circle cx="40" cy="40" r="35" fill="none" stroke="#e0e3e8" stroke-width="6"/><circle cx="40" cy="40" r="35" fill="none" stroke="'+gc+'" stroke-width="6" stroke-dasharray="'+circ+'" stroke-dashoffset="'+(circ*(1-pct/100))+'" stroke-linecap="round" transform="rotate(-90 40 40)"/></svg><div class="ct"><div class="gv" style="color:'+gc+'">'+fmtNum(r,1)+'</div><div class="gl">RSI14</div></div></div>';
  h+='<div class="gauge-info"><b>MACD 分析</b><br>DIF: '+fmtNum(d.macd.dif,2)+'<br>DEA: '+fmtNum(d.macd.dea,2)+'<br>柱状: <span style="color:'+R+';font-weight:700">'+(d.macd.mval>0?'+':'')+fmtNum(d.macd.mval,2)+'</span><br><br><b>解读</b><br>'+(d.macd.mval>0?'DIF上穿DEA, 金叉形成, 红柱放量, 动能转多':'DIF下穿DEA, 死叉, 绿柱放大, 动能转空')+'<br>RSI '+fmtNum(r,1)+' '+rsiL(r)+'区间</div></div></div>';
  return h;
}

// 8. KDJ & Boll
function panelKDJBoll(d){
  var ud=((d.boll.upper-d.price)/d.price*100).toFixed(1),ld=((d.price-d.boll.lower)/d.price*100).toFixed(1);
  var h='<div class="card"><h3>📐 KDJ & 布林带</h3><div style="font-size:.74em;line-height:1.7">';
  h+='<b>KDJ 随机指标</b><br>K: '+fmtNum(d.kdj.k,1)+' / D: '+fmtNum(d.kdj.d,1)+' / J: <span style="color:'+R+';font-weight:700">'+fmtNum(d.kdj.j,1)+'</span><br>';
  h+=(d.kdj.k>d.kdj.d?'K上穿D金叉':'K下穿D死叉')+' | '+(d.kdj.j>80?'⚠️ J>80, 短期回调压力':d.kdj.j<20?'⚠️ J<20, 短期超卖反弹机会':'J值正常, 中性区域')+'<br><br>';
  h+='<b>布林带 (20,2)</b><br>上轨: '+fmtNum(d.boll.upper,0)+' (距 +'+ud+'%)<br>中轨: <b>'+fmtNum(d.boll.middle,0)+'</b><br>下轨: '+fmtNum(d.boll.lower,0)+' (距 -'+ld+'%)<br>';
  h+='带宽: '+(d.boll.upper-d.boll.lower).toFixed(1)+' ('+((d.boll.upper-d.boll.lower)/d.boll.middle*100).toFixed(1)+'%)<br><br>';
  h+='<b>信号</b>: 价格站'+(d.price>d.boll.middle?'上':'下')+'中轨, 短期'+(d.price>d.boll.middle?'偏多, 注意上轨'+fmtNum(d.boll.upper,0)+'阻力':'偏弱, 关注下轨'+fmtNum(d.boll.lower,0)+'支撑');
  h+='</div></div>';
  return h;
}

async function analyzeStock(){
  // 固定分析腾讯控股 00700.HK（港股）
  var info={secid:'116.00700', raw:'00700', market:'港股'};

  var mg=document.getElementById('main');
  mg.innerHTML=''; // data loads silently

  var d;
  try{
    var quote=await fetchQuote(info.secid);
    var kl=await fetchKline(info.secid,120);
    d=buildData(quote,kl,info);
    var _stamp=document.getElementById('dataStamp');
    if(_stamp){ _stamp.textContent='实时行情'+(window.__gtimgDt?(' · '+window.__gtimgDt):'（东财）'); _stamp.className='datastamp'; }
    // Augment with fundamentals (cannot fetch from public API, use defaults)
    d.fundamentals={eps:+(d.price/15).toFixed(2),bvps:+(d.price/d.pb).toFixed(2),roe:15,profitGrowth:10,revenueGrowth:8,profitMargin:d.peTTM>0?Math.min(40,100/d.peTTM*5):20,opMargin:25,debtRatio:50,currentRatio:1.5,fcf:d.marketCap*0.03,dividendYield:1.5,peHistory:{low5y:Math.max(8,d.peTTM*0.6),high5y:d.peTTM*2,median5y:d.peTTM*1.2}};
    d.newsSentiment=d.isDemo?d.newsSentiment:{positive:60,neutral:25,negative:15,heatScore:60};
    d.fundFlow={totalNet:0,majorNet:0,buyRatio:50,sellRatio:50};
    d.keyNews=d.keyNews||[{date:'今日',title:'当前为实时数据, 暂未配置新闻流',s:'neutral'}];
    d.analysts=d.analysts||{total:0,buyPct:0,holdPct:0,sellPct:0,avgTarget:d.price*1.2,highTarget:d.price*1.5,lowTarget:d.price*0.9};
    d.analystList=d.analystList||[];
  }catch(err){
    console.error('API fail, using demo:',err);
    d=getDemoData();
    if(d.kline&&!d.kline.length) d.kline=genDemoKline();
    if(!d.kline) d.kline=genDemoKline();
    mg.innerHTML+='<div class="status-error" style="margin-bottom:8px">⚠️ 实时接口失败, 已切换到内置演示数据: '+err.message+'</div>';
    var _stamp2=document.getElementById('dataStamp');
    if(_stamp2){ _stamp2.textContent='⚠️ 演示数据（实时接口失败）'; _stamp2.className='datastamp warn'; }
  }

  var parts=[panelReco(d),panelScore(d),panelFund(d),panelChart(),panelIndi(d),panelMA(d),panelMACDRSI(d),panelKDJBoll(d),panelSent(d),panelAnly(d)];
  if(mg.querySelector('.status-error')){
    mg.innerHTML=mg.innerHTML.replace(/<div class="status-error.*?<\/div>/,'')+parts.join('');
  } else {
    mg.innerHTML=parts.join('');
  }

  setTimeout(function(){var cv=document.getElementById('klineChart');if(cv)renderChart(cv,d);},200);
  document.getElementById('updateTime').textContent=new Date().toLocaleString('zh-CN');
}

// =============================================================
//  SECTION 7: CHART RENDER
// =============================================================
function renderChart(cv,d){
  var ctx=cv.getContext('2d'),rect=cv.parentElement.getBoundingClientRect();
  var w=rect.width,h=Math.max(180,Math.min(280,w*.7));
  cv.width=w*2;cv.height=h*2;cv.style.width=w+'px';cv.style.height=h+'px';ctx.scale(2,2);
  var pad={t:15,r:40,b:28,l:40},pw=w-pad.l-pad.r,ph=h-pad.t-pad.b;
  var kl=d.kline,cl=kl.map(function(x){return x.close;});
  var ma=function(n){var v=0;for(var i=Math.max(0,kl.length-n);i<kl.length;i++)v+=kl[i].close;return v/Math.min(n,kl.length);};
  var ap=cl.slice();var maVals={};
  [5,20,60,120,250].forEach(function(n){var v=MA(kl,n);ap=ap.concat(v.filter(function(x){return x!=null;}));maVals[n]=v;});
  if(d.boll&&d.boll.upper) ap.push(d.boll.upper,d.boll.middle,d.boll.lower);
  ap=ap.filter(function(x){return x!=null&&!isNaN(x);});
  var ym=Math.min.apply(null,ap)*0.97, yx=Math.max.apply(null,ap)*1.03;
  var xs=function(i){return pad.l+(i/Math.max(1,kl.length-1))*pw;};
  var ys=function(v){return pad.t+(1-(v-ym)/(yx-ym))*ph;};
  // Grid
  ctx.strokeStyle='#eee';ctx.lineWidth=.5;
  for(var i=0;i<=4;i++){var y=pad.t+(i/4)*ph;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(w-pad.r,y);ctx.stroke();ctx.fillStyle='#999';ctx.font='8px sans-serif';ctx.textAlign='right';ctx.fillText((yx-(i/4)*(yx-ym)).toFixed(0),pad.l-5,y+3);}
  // Date
  ctx.textAlign='center';ctx.fillStyle='#999';
  for(var i=0;i<5;i++){var idx=Math.round((i/4)*Math.max(0,kl.length-1));if(kl[idx])ctx.fillText(kl[idx].date.slice(5),xs(idx),h-pad.b+11);}
  // Area
  ctx.beginPath();ctx.moveTo(xs(0),ys(ym));
  for(var i=0;i<kl.length;i++)ctx.lineTo(xs(i),ys(cl[i]));
  ctx.lineTo(xs(kl.length-1),ys(ym));ctx.closePath();
  var grd=ctx.createLinearGradient(0,pad.t,0,h-pad.b);grd.addColorStop(0,'rgba(231,76,60,.1)');grd.addColorStop(1,'rgba(231,76,60,.01)');ctx.fillStyle=grd;ctx.fill();
  // MA lines
  function drawMA(arr,c,lw){ctx.beginPath();ctx.strokeStyle=c;ctx.lineWidth=lw;var st=false;for(var i=0;i<arr.length;i++){if(arr[i]==null)continue;var x=xs(i),y=ys(arr[i]);if(!st){ctx.moveTo(x,y);st=true;}else ctx.lineTo(x,y);}ctx.stroke();}
  drawMA(maVals[5],R,1);drawMA(maVals[20],O,1);drawMA(maVals[60],B,1.2);
  // MA120/250 dashed
  ctx.beginPath();ctx.strokeStyle=P;ctx.lineWidth=.8;ctx.setLineDash([3,3]);ctx.moveTo(pad.l,ys(maVals[120]&&maVals[120][maVals[120].length-1]||yx));ctx.lineTo(w-pad.r,ys(maVals[120]&&maVals[120][maVals[120].length-1]||yx));ctx.stroke();
  if(d.boll){ctx.beginPath();ctx.strokeStyle=G;ctx.lineWidth=.6;ctx.setLineDash([2,2]);ctx.moveTo(pad.l,ys(d.boll.upper));ctx.lineTo(w-pad.r,ys(d.boll.upper));ctx.stroke();ctx.moveTo(pad.l,ys(d.boll.lower));ctx.lineTo(w-pad.r,ys(d.boll.lower));ctx.stroke();ctx.setLineDash([]);}
  // Price line
  ctx.beginPath();ctx.strokeStyle='#2c3e50';ctx.lineWidth=1.5;ctx.moveTo(xs(0),ys(cl[0]));for(var i=1;i<kl.length;i++)ctx.lineTo(xs(i),ys(cl[i]));ctx.stroke();
  // Mark
  var lx=xs(kl.length-1),ly=ys(cl[kl.length-1]);
  ctx.beginPath();ctx.fillStyle=R;ctx.arc(lx,ly,3,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.2;ctx.stroke();
  ctx.fillStyle=R;ctx.font='bold 10px sans-serif';ctx.textAlign='left';ctx.fillText(cl[cl.length-1].toFixed(0),lx+5,ly-3);
}
